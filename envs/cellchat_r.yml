# DAM-DRUG — R / CellChat environment
# Used for: CellChat ligand-receptor analysis (Phase 2, steps 37–38)
#
# Recreate:
#   conda env create -f envs/cellchat_r.yml
#   conda activate cellchat_r
#   # CellChat is not on conda-forge; install from GitHub post-create:
#   conda run -n cellchat_r /opt/conda/envs/cellchat_r/bin/Rscript -e "
#     remotes::install_github('jinworks/CellChat', upgrade='never', build_vignettes=FALSE)
#   "
#
# Source of truth: /opt/conda/envs/cellchat_r/bin/Rscript inside cellchat.sif
#   (envs/cellchat_sif_r_packages.csv)

name: cellchat_r
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - r-base=4.3.3             # exact: cellchat_sif_r_packages.csv (col base=4.3.3)
  # Core R data manipulation
  - r-matrix=1.6-5           # exact
  - r-data.table=1.17.8      # exact
  - r-dplyr=1.1.4            # exact
  - r-tidyr=1.3.1            # exact
  - r-tidyverse=2.0.0        # exact
  # Visualisation
  - r-ggplot2=3.5.2          # exact
  - r-patchwork=1.3.2        # exact
  - r-ggraph=2.2.1           # exact
  - r-ggalluvial=0.12.5      # exact
  - r-circlize=0.4.16        # exact
  - r-svglite=2.2.1          # exact
  - r-ggrepel=0.9.6          # exact
  - r-cowplot=1.2.0          # exact
  # Network / NMF
  - r-igraph=2.1.4           # exact
  - r-nmf=0.28               # exact (conda-forge had 0.21; upgraded to 0.28)
  # Parallel computation
  - r-future=1.67.0          # exact
  - r-future.apply=1.20.0    # exact
  # Package management
  - r-remotes=2.5.0          # exact
  - r-devtools=2.4.5         # exact
  - r-biocmanager=1.30.26    # exact
  # Data I/O
  - r-hdf5r=1.3.12           # exact
  - r-curl=7.0.0             # exact
  - r-xml2=1.4.0             # exact
  - r-httr=1.4.7             # exact
  - r-jsonlite=2.0.0         # exact
  # Statistical
  - r-nloptr=2.2.1           # exact
  - r-lme4=1.1-37            # exact
  - r-pbkrtest=0.5.5         # exact
  - r-car=3.1-3              # exact
  - r-rstatix=0.7.2          # exact
  - r-ggpubr=0.6.1           # exact
  # Bioconductor
  - bioconductor-complexheatmap=2.18.0   # exact
  - bioconductor-limma=3.58.1            # exact
  - bioconductor-mast=1.28.0             # exact
  - bioconductor-biocneighbors=1.20.0    # exact
  # CellChat (GitHub, post-create — see header):
  # CellChat version: 2.2.0.9001   (exact: cellchat_sif_r_packages.csv)
  # CellChatDB: bundled with CellChat v2; "Secreted Signaling" subset used (1,191 L-R pairs)
  #
  # Also present in container (installed as CellChat dep or pre-existing):
  # Seurat=5.4.0, reticulate=1.45.0 — not used directly in this analysis
