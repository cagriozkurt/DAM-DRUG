# DAM-DRUG — main analysis and figure generation environment
# Used by: Phase 1 QC, Phase 3 structure, Phase 6 figures, tables
# Exact versions from scanpy_env in current scanpy.sif container
#
# Recreate:
#   conda env create -f envs/scanpy_env.yml
#   conda activate scanpy_env

name: scanpy_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10.20
  - scanpy=1.11.5
  - anndata=0.11.4
  - numpy=2.2.6              # NOTE: 2.x here; scenic env uses 1.26.4
  - scipy=1.15.2
  - pandas=2.3.3
  - matplotlib=3.10.8
  - seaborn=0.13.2
  - scikit-learn=1.7.2
  - statsmodels=0.14.6
  - h5py=3.16.0
  - umap-learn=0.5.11
  - leidenalg=0.11.0
  - numba=0.65.0
  - networkx=3.4.2
  - pip
