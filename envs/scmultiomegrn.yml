# DAM-DRUG — scMultiomeGRN + CellOracle + ATAC environment
# Used for: scMultiomeGRN multi-omic GRN (Phase 2, steps 31–33),
#           ATAC differential accessibility + FIMO (step 32),
#           CellOracle in-silico TF perturbation (Phase 5, step 35)
#
# Recreate:
#   conda env create -f envs/scmultiomegrn.yml
#   conda activate scMultiomeGRN
#   # Then install pip packages (order matters for velocyto):
#   pip install "cython" "numpy<2"
#   pip install velocyto --no-build-isolation
#   pip install celloracle
#   pip install torch==2.4.0 torchvision==0.19.0 torchaudio==2.4.0 \
#       --index-url https://download.pytorch.org/whl/cu121
#   pip install torch_geometric lightning
#
# Note: PyTorch installed with CUDA 12.1 wheels for TRUBA V100 GPUs.
#   On CPU-only machines, omit the --index-url and use default PyTorch wheels.
#
# Source: code/slurm/31_scMultiomeGRN_env.slurm, 34_setup_celloracle.slurm

name: scMultiomeGRN
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  # ATAC / motif scanning tools
  - bedops                  # BED file manipulation
  - meme=5.4.1              # confirmed pinned: 31_scMultiomeGRN_env.slurm
  - perl-bioperl            # MEME suite perl dependency
  # GRN / co-expression
  - arboreto                # GRNBoost2 (used within scMultiomeGRN)
  # Numerical
  - anndata=0.10.8          # exact: miniconda_backup.tar (scMultiomeGRN env)
  - h5py
  - pandas
  - scikit-learn
  - scipy
  - tqdm
  - gensim                  # word2vec embeddings for scMultiomeGRN
  - pip
  - pip:
    - "numpy<2"             # confirmed constraint: velocyto build compat
    - cython                # velocyto build-time dependency
    - "velocyto==0.17.17"   # exact: miniconda_backup.tar (scMultiomeGRN env); --no-build-isolation required
    - "celloracle==0.20.0"  # exact: miniconda_backup.tar (scMultiomeGRN env)
    # PyTorch (CUDA 12.1 for TRUBA V100; replace URL for CPU or other CUDA)
    - "torch==2.4.0"        # confirmed: 31_scMultiomeGRN_env.slurm
    - "torchvision==0.19.0" # confirmed: 31_scMultiomeGRN_env.slurm
    - "torchaudio==2.4.0"   # confirmed: 31_scMultiomeGRN_env.slurm
    - torch_geometric
    - lightning             # PyTorch Lightning
